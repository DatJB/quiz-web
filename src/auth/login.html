<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Hệ thống thi trắc nghiệm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../data/users.js"></script>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-[#ff4d6d] via-[#ef233c] to-[#b5179e] flex items-center justify-center p-4">

<div class="w-full max-w-6xl grid lg:grid-cols-2 gap-8 items-center">

  <div class="bg-white rounded-xl shadow-2xl p-8 w-full">

    <div class="text-center space-y-4 mb-8">
      <div class="flex justify-center">
        <div
            class="w-16 h-16 bg-white border border-gray-200 shadow-sm rounded-full flex items-center justify-center overflow-hidden">
          <img src="../../images/logo-ptit.png" alt="Logo" class="w-10 h-10 object-contain"/>
        </div>
      </div>
      <div>
        <h2 class="text-2xl font-bold text-gray-900">Hệ thống thi trắc nghiệm</h2>
        <p class="text-gray-500 mt-2 text-sm">Học viện Công nghệ Bưu chính Viễn thông</p>
      </div>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label for="username" class="block mb-1 text-sm font-medium text-gray-700">Tên đăng
          nhập</label>
        <input type="text" id="username" placeholder="Nhập tên đăng nhập"
               class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-colors"/>
      </div>

      <div>
        <label for="password" class="block mb-1 text-sm font-medium text-gray-700">Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu"
               class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-colors"/>
      </div>

      <button type="submit"
              class="w-full bg-[#EC3136] hover:bg-[#B8232A] text-white py-2.5 rounded-md font-medium transition-colors shadow-md">
        Đăng nhập
      </button>
    </form>

    <div class="mt-6 text-center space-y-3">
      <p class="text-sm text-gray-500">
        Chưa có tài khoản?
        <a href="register.html" class="text-[#EC3136] font-semibold hover:underline">Đăng ký
          ngay</a>
      </p>
    </div>
  </div>

  <div class="hidden lg:block h-full">
    <div class="rounded-xl overflow-hidden shadow-2xl h-full h-[600px]">
      <img src="../../images/ptit.png" alt="Học viện PTIT" class="w-full h-full object-cover"/>
    </div>
  </div>

</div>

<script src="../../data/users.js"></script>
<script src="../common/constants.js"></script>
<script src="../common/toast.js"></script>
<script src="../js/login.js"></script>

</body>
</html>
