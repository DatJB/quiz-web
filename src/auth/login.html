<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Hệ thống thi trắc nghiệm</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex">

  <!-- LEFT: FORM -->
  <div class="w-full md:w-1/3 flex items-center justify-center p-8">
    
    <div class="w-full max-w-md">
      
      <!-- Header -->
      <div class="text-center space-y-4">
        <div class="flex justify-center">
          <img src="../../images/logo-ptit.png" class="w-16 h-16" />
        </div>

        <div>
          <h2 class="text-2xl font-bold">Hệ thống thi trắc nghiệm</h2>
          <p class="text-gray-500 mt-2">
            Học viện Công nghệ Bưu chính Viễn thông
          </p>
        </div>
      </div>

      <!-- Form -->
      <form id="loginForm" class="space-y-4 mt-6">

        <div>
          <label class="block mb-1 font-medium">Tên đăng nhập</label>
          <input 
            type="text" 
            id="username"
            placeholder="Nhập tên đăng nhập"
            class="w-full border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
          />
        </div>

        <div>
          <label class="block mb-1 font-medium">Mật khẩu</label>
          <input 
            type="password" 
            id="password"
            placeholder="Nhập mật khẩu"
            class="w-full border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
          />
        </div>

        <button 
          type="submit"
          class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-md transition"
        >
          Đăng nhập
        </button>

      </form>

      <!-- Links -->
      <div class="mt-4 text-center space-y-2">
        <p class="text-sm text-gray-500">
          Chưa có tài khoản?
          <a href="register.html" class="text-red-600 hover:underline">
            Đăng ký ngay
          </a>
        </p>
      </div>

    </div>
  </div>


  <!-- RIGHT: IMAGE -->
  <div class="w-0 md:w-2/3 relative">
    <img 
      src="../../images/ptit.png"
      class="absolute inset-0 w-full h-full object-cover object-[center_60%]"
    />
  </div>

</body>



<script>
  const form = document.getElementById("loginForm");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
      alert("Vui lòng điền đầy đủ thông tin!");
      return;
    }

    const users = JSON.parse(localStorage.getItem("users")) || [];

    // Tìm user trùng username + password
    const user = users.find(u => 
        u.username === usernameInput && u.password === passwordInput
    );

    if (user) {
        // Lưu user đang đăng nhập
        localStorage.setItem("currentUser", JSON.stringify(user));

        alert("Đăng nhập thành công!");

        // Phân quyền
        if (user.role === "admin") {
            window.location.href = "admin-dashboard.html";
        } else {
            window.location.href = "student-dashboard.html";
        }

    } else {
        alert("Sai tên đăng nhập hoặc mật khẩu!");
    }

    localStorage.setItem("currentUser", JSON.stringify(user));

    alert("Đăng nhập thành công!");

    // Chuyển trang
    window.location.href = "home.html";
  });
</script>

</body>
</html>
