<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Hệ thống thi trắc nghiệm</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-[#EC3136] to-[#B8232A] flex items-center justify-center p-4">

<div class="w-full max-w-6xl grid lg:grid-cols-2 gap-8 items-stretch">

  <div class="bg-white rounded-xl shadow-2xl p-6 lg:p-8 w-full flex flex-col justify-center">

    <div class="text-center space-y-2 mb-6">
      <div class="flex justify-center">
        <div class="w-14 h-14 bg-white border border-gray-200 shadow-sm rounded-full flex items-center justify-center overflow-hidden">
          <img src="../../images/logo-ptit.png" alt="Logo" class="w-8 h-8 object-contain"/>
        </div>
      </div>
      <div>
        <h2 class="text-2xl font-bold text-gray-900">Đăng ký tài khoản</h2>
        <p class="text-gray-500 mt-1 text-sm">Học viện Công nghệ Bưu chính Viễn thông</p>
      </div>
    </div>

    <form id="registerForm" class="space-y-3">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label for="fullName" class="block mb-1 text-sm font-medium text-gray-700">Họ và tên</label>
          <input type="text" id="fullName" placeholder="VD: Nguyễn Văn A"
                 class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#EC3136] transition-colors"/>
        </div>
        <div>
          <label for="studentCode" class="block mb-1 text-sm font-medium text-gray-700">Mã sinh viên</label>
          <input type="text" id="studentCode" placeholder="VD: B20DCCN001"
                 class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#EC3136] transition-colors"/>
        </div>
      </div>

      <div>
        <label for="email" class="block mb-1 text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" placeholder="example@student.ptit.edu.vn"
               class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#EC3136] transition-colors"/>
      </div>

      <div>
        <label for="username" class="block mb-1 text-sm font-medium text-gray-700">Tên đăng nhập</label>
        <input type="text" id="username" placeholder="Nhập tên đăng nhập"
               class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#EC3136] transition-colors"/>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label for="password" class="block mb-1 text-sm font-medium text-gray-700">Mật khẩu</label>
          <input type="password" id="password" placeholder="Nhập mật khẩu"
                 class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#EC3136] transition-colors"/>
        </div>
        <div>
          <label for="confirmPassword" class="block mb-1 text-sm font-medium text-gray-700">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu"
                 class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#EC3136] transition-colors"/>
        </div>
      </div>

      <button type="submit"
              class="w-full bg-[#EC3136] hover:bg-[#B8232A] text-white py-2.5 mt-3 rounded-md font-medium transition-colors shadow-md">
        Đăng ký
      </button>
    </form>

    <div class="mt-4 text-center">
      <p class="text-sm text-gray-500">
        Đã có tài khoản?
        <a href="login.html" class="text-[#EC3136] font-semibold hover:underline">Đăng nhập ngay</a>
      </p>
    </div>
  </div>

  <div class="hidden lg:block relative rounded-xl overflow-hidden shadow-2xl h-full w-full">
    <img src="../../images/ptit.png" alt="Học viện PTIT" class="absolute inset-0 w-full h-full object-cover"/>
  </div>

</div>

<script src="../../data/users.js"></script>
<script src="../common/constants.js"></script>
<script src="../common/toast.js"></script>
<script src="../js/register.js"></script>

</body>
</html>
