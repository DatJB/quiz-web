<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ của tôi - Hệ thống thi trắc nghiệm</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">

<header class="bg-[#EC3136] text-white shadow-md">
  <div class="container mx-auto px-4 py-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4">
        <button id="btnBack" class="p-2 hover:bg-white/10 rounded-md transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
        </button>
        <div>
          <h1 class="text-2xl font-bold">Hồ sơ của tôi</h1>
          <p class="text-sm opacity-90 mt-1">Quản lý tài khoản và kết quả học tập</p>
        </div>
      </div>
      <button id="btnLogout"
              class="flex items-center px-4 py-2 bg-white text-[#EC3136] rounded-md hover:bg-gray-100 font-medium transition-colors shadow-sm">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
        Đăng xuất
      </button>
    </div>
  </div>
</header>

<main class="container mx-auto px-4 py-8">
  <div class="max-w-5xl mx-auto space-y-6">

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
        <div class="w-12 h-12 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
          <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
        </div>
        <div>
          <p class="text-sm text-gray-500 font-medium">Số bài thi đã làm</p>
          <p id="statTotalExams" class="text-2xl font-bold text-gray-900">0</p>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
        <div
            class="w-12 h-12 bg-green-50 rounded-lg flex items-center justify-center flex-shrink-0">
          <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
          </svg>
        </div>
        <div>
          <p class="text-sm text-gray-500 font-medium">Điểm trung bình</p>
          <p id="statAvgScore" class="text-2xl font-bold text-gray-900">0.0</p>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
        <div
            class="w-12 h-12 bg-orange-50 rounded-lg flex items-center justify-center flex-shrink-0">
          <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor"
               viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path>
          </svg>
        </div>
        <div>
          <p class="text-sm text-gray-500 font-medium">Điểm cao nhất</p>
          <p id="statHighScore" class="text-2xl font-bold text-gray-900">0.0</p>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <div class="bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="border-b border-gray-100 px-6 py-4">
          <h2 class="text-lg font-bold text-gray-800">Thông tin cá nhân</h2>
        </div>
        <div class="p-6 space-y-4">
          <div class="flex justify-center mb-6">
            <div
                class="w-24 h-24 bg-[#EC3136] rounded-full flex items-center justify-center shadow-inner">
              <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor"
                   viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
              </svg>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block mb-1 text-sm font-medium text-gray-700">Mã sinh viên</label>
              <input type="text" id="profStudentCode" disabled
                     class="w-full border border-gray-200 bg-gray-50 text-gray-600 rounded-md px-4 py-2 text-sm cursor-not-allowed"/>
            </div>
            <div>
              <label class="block mb-1 text-sm font-medium text-gray-700">Lớp</label>
              <input type="text" id="profClass" disabled
                     class="w-full border border-gray-200 bg-gray-50 text-gray-600 rounded-md px-4 py-2 text-sm cursor-not-allowed"/>
            </div>
          </div>

          <div>
            <label class="block mb-1 text-sm font-medium text-gray-700">Họ và tên</label>
            <input type="text" id="profFullName" disabled
                   class="w-full border border-gray-200 bg-gray-50 text-gray-600 rounded-md px-4 py-2 text-sm cursor-not-allowed"/>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block mb-1 text-sm font-medium text-gray-700">Số điện thoại</label>
              <input type="text" id="profPhone" disabled
                     class="w-full border border-gray-200 bg-gray-50 text-gray-600 rounded-md px-4 py-2 text-sm cursor-not-allowed"/>
            </div>
            <div>
              <label class="block mb-1 text-sm font-medium text-gray-700">Email</label>
              <input type="email" id="profEmail" disabled
                     class="w-full border border-gray-200 bg-gray-50 text-gray-600 rounded-md px-4 py-2 text-sm cursor-not-allowed"/>
            </div>
          </div>

          <div>
            <label class="block mb-1 text-sm font-medium text-gray-700">Tên đăng nhập</label>
            <input type="text" id="profUsername" disabled
                   class="w-full border border-gray-200 bg-gray-50 text-gray-600 rounded-md px-4 py-2 text-sm cursor-not-allowed"/>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-100 h-fit">
        <div class="border-b border-gray-100 px-6 py-4">
          <h2 class="text-lg font-bold text-gray-800">Đổi mật khẩu</h2>
        </div>
        <div class="p-6">
          <form id="changePasswordForm" class="space-y-4">
            <div>
              <label for="currentPassword" class="block mb-1 text-sm font-medium text-gray-700">Mật
                khẩu hiện tại</label>
              <input type="password" id="currentPassword" placeholder="Nhập mật khẩu hiện tại"
                     class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#EC3136]"/>
            </div>

            <div>
              <label for="newPassword" class="block mb-1 text-sm font-medium text-gray-700">Mật khẩu
                mới</label>
              <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới"
                     class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#EC3136]"/>
            </div>

            <div>
              <label for="confirmPassword" class="block mb-1 text-sm font-medium text-gray-700">Xác
                nhận mật khẩu mới</label>
              <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới"
                     class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#EC3136]"/>
            </div>

            <button type="submit"
                    class="w-full bg-gray-900 hover:bg-gray-800 text-white py-2.5 mt-2 rounded-md font-medium transition-colors flex items-center justify-center">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
              </svg>
              Lưu mật khẩu mới
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100">
      <div class="border-b border-gray-100 px-6 py-4">
        <h2 class="text-lg font-bold text-gray-800">Lịch sử thi gần đây</h2>
      </div>
      <div class="p-6">
        <div id="historyContainer" class="space-y-3">
        </div>
      </div>
    </div>

  </div>
</main>

<script src="../../data/users.js"></script>
<script src="../../data/exams.js"></script>
<script src="../../data/results.js"></script>
<script src="../common/constants.js"></script>
<script src="../common/toast.js"></script>
<script src="profile.js"></script>
</body>
</html>
