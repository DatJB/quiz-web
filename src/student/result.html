<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết quả bài thi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="min-h-screen bg-gray-50">

  <!-- Header -->
  <header class="bg-red-600 text-white shadow-md">
    <div class="container mx-auto px-4 py-4">
      <h1 class="text-2xl font-semibold">Kết quả bài thi</h1>
      <p id="examTitle" class="text-sm opacity-90 mt-1"></p>
    </div>
  </header>

  <main class="container mx-auto px-4 py-8 max-w-5xl">

    <!-- Summary -->
    <div class="mb-6 border-t-4 border-red-600 bg-white rounded-xl shadow">
      <div class="text-center p-6">

        <div class="flex justify-center mb-4">
          <div id="scoreCircle"
               class="w-32 h-32 rounded-full border-8 flex items-center justify-center">
            <div class="text-center">
              <div id="scoreValue" class="text-4xl font-bold"></div>
              <div class="text-md text-gray-600">điểm</div>
            </div>
          </div>
        </div>

        <h2 id="scoreLabel" class="text-2xl font-semibold mb-6"></h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

          <div class="flex items-center gap-5 p-4 px-8 bg-green-50 rounded-lg">
            
            <div>
                <img src="../../images/right-answer.png" 
                    class="w-8 h-8" />
            </div>

            <div>
              <p class="text-md text-gray-600">Trả lời đúng</p>
              <p id="correctInfo" class="text-xl font-semibold mt-0.5"></p>
            </div>
          </div>
          
          <div class="flex items-center gap-5 p-4 px-8 bg-blue-50 rounded-lg">
            <div>
                <img src="../../images/proportion.png" 
                    class="w-8 h-8" />
            </div>

            <div>
              <p class="text-md text-gray-600">Tỷ lệ đúng</p>
              <p id="percentInfo" class="text-xl font-semibold mt-0.5"></p>
            </div>
          </div>

          <div class="flex items-center gap-5 p-4 px-8 bg-purple-50 rounded-lg">
            <div>
                <img src="../../images/complete.png" 
                    class="w-8 h-8" />
            </div>

            <div>
              <p class="text-md text-gray-600">Hoàn thành</p>
              <p id="completedTime" class="text-xl font-semibold mt-0.5"></p>
            </div>
          </div>

        </div>

        <!-- Progress -->
        <div class="mb-4">
          <div class="flex justify-between text-sm mb-2">
            <span>Tiến độ hoàn thành</span>
            <span id="progressText"></span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-3">
            <div id="progressBar"
                 class="bg-red-600 h-3 rounded-full"
                 style="width: 0%">
            </div>
          </div>
        </div>

        <button onclick="goHome()"
                class="w-full bg-red-600 hover:opacity-90 text-white font-semibold py-2 rounded-lg">
          <i class="fa-solid fa-house mr-2"></i> Về trang chủ
        </button>
      </div>
    </div>

    <!-- Detailed Answers -->
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-semibold mb-6">Chi tiết bài làm</h2>
      <div id="detailContainer" class="space-y-6"></div>
    </div>

  </main>

<script>
    const params = new URLSearchParams(window.location.search);
    const examId = params.get("examId");
    const examData = JSON.parse(localStorage.getItem("currentExam"));

    function loadResult() {
        const result = JSON.parse(localStorage.getItem("result-" + examId));

        renderPage(result);
    }

    function renderPage(result) {
        document.getElementById("examTitle").innerText = examData.title;

        const score = result.score;
        const percent = (result.correctAnswers / result.totalQuestions) * 100;

        document.getElementById("scoreValue").innerText = score.toFixed(1);

        const scoreCircle = document.getElementById("scoreCircle");
        const scoreLabel = document.getElementById("scoreLabel");

        if (score >= 5) {
            scoreCircle.classList.add("border-green-500", "bg-green-50");
        } else {
            scoreCircle.classList.add("border-red-500", "bg-red-50");
        }

        if (score >= 8) scoreLabel.innerText = "Xuất sắc";
        else if (score >= 6.5) scoreLabel.innerText = "Khá";
        else if (score >= 5) scoreLabel.innerText = "Trung bình";
        else scoreLabel.innerText = "Yếu";

        document.getElementById("correctInfo").innerText =
            result.correctAnswers + "/" + result.totalQuestions;

        document.getElementById("percentInfo").innerText =
            percent.toFixed(0) + "%";

        document.getElementById("completedTime").innerText =
            new Date(result.completedAt).toLocaleTimeString("vi-VN");

        document.getElementById("progressText").innerText =
            result.correctAnswers + "/" + result.totalQuestions + " câu";

        document.getElementById("progressBar").style.width =
            percent + "%";

        renderDetails(result);
    }

    function renderDetails(result) {
        const container = document.getElementById("detailContainer");
        container.innerHTML = "";

        examData.questions.forEach((q, index) => {
            const userAnswer = result.answers[q.id];
            const isCorrect = userAnswer === q.correctAnswer;

            let block = document.createElement("div");
            block.className = "p-4 rounded-lg border-2 " +
            (isCorrect
                ? "bg-green-50 border-green-200"
                : "bg-red-50 border-red-200");

            let optionsHtml = "";

            q.options.forEach((opt, i) => {

                const isUser = userAnswer === i;
                const isRight = i === q.correctAnswer;

                let style = "bg-white border border-gray-200";

                if (isRight) style = "bg-green-100 border border-green-300";
                else if (isUser) style = "bg-red-100 border border-red-300";

                const safeOpt = opt.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                optionsHtml += `
                    <div class="p-2 rounded ${style}">
                        <strong>${String.fromCharCode(65 + i)}.</strong> ${safeOpt}
                    </div>
                    `;
            });

            let optionStyle = "bg-gray-200 border-[#DADBDD]";
            if (result.answers[q.id] !== undefined) {
                if (isCorrect) optionStyle = "bg-green-100 border-[#C5E2CF]";
                else optionStyle = "bg-red-100 border-[#E5CBCB]";
            }

            block.innerHTML = `
                <p class="font-medium mb-3">
                    Câu ${index + 1}: ${q.question}
                </p>
                <div class="space-y-2 mb-3">
                    ${optionsHtml}
                </div>
                <div class="text-sm mt-5">
                    <span class="px-2 py-1 ${optionStyle} rounded-xl font-semibold border">
                        ${result.answers[q.id] !== undefined ? "Bạn chọn:" : ""} ${userAnswer !== undefined ? String.fromCharCode(65 + userAnswer) : "Chưa trả lời"}
                    </span>
                    <span class="px-2 py-1 bg-green-100 rounded-xl font-semibold border border-[#C5E2CF] ml-2">
                        Đáp án đúng: ${String.fromCharCode(65 + q.correctAnswer)}
                    </span>
                </div>
                ${q.explanation ? `
                    <div class="mt-4 p-3 bg-blue-50 rounded-lg border border-[#BEDBFF] text-sm">
                        <strong>Giải thích:</strong> ${q.explanation}
                    </div>` : ""}
                `;

                container.appendChild(block);
            });
    }

    function goHome() {
        window.location.href = "home.html";
    }

    loadResult();
</script>

</body>
</html>
