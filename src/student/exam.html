<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm bài thi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Header -->
     <header class="bg-red-600 text-white shadow-md sticky top-0 z-10">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div>
                    <h1 id="examTitle" class="text-xl font-semibold"></h1>
                    <p id="questionInfo" class="text-md opacity-90 mt-1"></p>
                </div>

                <div class="bg-white/10 px-4 py-2 rounded-lg">
                    <i class="fa-regular fa-clock mr-2 mt-1"></i> <span id="timer" class="font-mono text-lg"></span>
                </div>
            </div>

            <div class="mt-3">
                <div class="w-full bg-white/20 rounded h-2">
                    <div id="progressBar" class="bg-white h-2 rounded w-0"></div>
                </div>
                <p id="progressText" class="text-sm mt-2"></p>
            </div>
        </div>
     </header>

     <main class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Question -->
        <div class="bg-white shadow rounded-lg p-6">
            <h2 id="questionText" class="text-lg font-semibold mb-4"></h2>
            <div id="options"></div>
        </div>

        <!-- Navigation -->
         <div class="mt-6 flex justify-between">
            <button id="prevBtn" class="px-4 py-2 border bg-white/10 font-semibold rounded-lg hover:bg-black/10">Câu trước</button>
            <button id="nextBtn" class="px-4 py-2 bg-red-600 text-white font-semibold rounded-lg hover:opacity-90">Câu tiếp theo</button>
         </div>

        <!-- Question grid-->
         <div class="mt-6 bg-white shadow rounded-lg p-6">
            <h3 class="text-lg font-semibold mb-4">Danh sách câu hỏi</h3>
            <div id="questionGrid" class="grid grid-cols-5 sm:grid-cols-10 gap-2"></div>

            <!-- Legend -->
            <div class="flex items-center gap-6 mt-6">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-red-600 rounded-md"></div>
                    <span>Đang làm</span>
                </div>

                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-green-200 rounded-md"></div>
                    <span>Đã trả lời</span>
                </div>

                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-md border"></div>
                    <span>Chưa trả lời</span>
                </div>
            </div>
         </div>
     </main>

    <!-- Submit modal -->
     <div id="submitDialog" class="fixed inset-0 bg-black/40 hidden items-center justify-center">
        <div class="bg-white p-6 rounded-lg w-96">
            <h3 class="text-lg font-semibold mb-3"><i class="fa-solid fa-circle-exclamation mr-2"></i>Xác nhận nộp bài</h3>
            <p id="dialogText" class="mb-4"></p>
            <div class="flex justify-end gap-3">
                <button onclick="closeDialog()" class="px-4 py-2 border rounded-lg hover:bg-black/10">Hủy</button>
                <button onclick="handleSubmit()" class="px-4 py-2 bg-[#BE393F] text-white rounded-lg hover:opacity-90">Nộp bài</button>
            </div>
        </div>
     </div>

     <script>
        const exam = JSON.parse(localStorage.getItem("currentExam"));
        document.getElementById("examTitle").textContent = exam.title;

        let currentQuestion = 0;
        let answers = {};
        let timeLeft = exam.duration * 60;
        let timer;

        renderQuestion();
        startTimer();
        // renderGrid();

        // Timer
        function startTimer() {
            timer = setInterval(() => {
                if (timeLeft <= 1) {
                    clearInterval();
                    handleSubmit();
                }
                timeLeft--;
                document.getElementById("timer").textContent = formatTime(timeLeft);
            }, 1000);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, "0");
            const s = (seconds % 60).toString().padStart(2, "0");
            return `${m}:${s}`;
        }

        // Render question
        function renderQuestion() {
            const q = exam.questions[currentQuestion];
            document.getElementById("questionText").innerHTML = 
            `<span class="text-red-600">Câu ${currentQuestion + 1}:</span> ${q.question}`;

            document.getElementById("questionInfo").textContent = 
            `Câu ${currentQuestion + 1} / ${exam.questions.length}`;

            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";

            q.options.forEach((option, index) => {
                const checked = answers[q.id] === index ? "checked" : "";
                const safeOption = option.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                optionsDiv.innerHTML += `
                <label class="flex items-start space-x-3 p-3 rounded-lg hover:bg-gray-50 border cursor-pointer">
                    <input type="radio" name="option" value="${index}" ${checked}
                    onchange="handleAnswer(${index})" class="mt-1.5 peer accent-red-600">
                    <span class="peer-checked:text-red-700"><strong>${String.fromCharCode(65 + index)}.</strong> ${safeOption}</span>
                </label>
                `;
            });

            const prevBtn = document.getElementById("prevBtn");
            if (currentQuestion === 0) {
                prevBtn.disabled = true;
                prevBtn.classList.add("opacity-50", "cursor-not-allowed");
            } else {
                prevBtn.disabled = false;
                prevBtn.classList.remove("opacity-50", "cursor-not-allowed");
            }

            const nextBtn = document.getElementById("nextBtn");
            if (currentQuestion === exam.questions.length - 1) {
                nextBtn.textContent = "Nộp bài";
                nextBtn.classList.remove("bg-red-600");
                nextBtn.classList.add("bg-[#BE393F]");
            } else {
                nextBtn.textContent = "Câu tiếp theo";
                nextBtn.classList.remove("bg-[#BE393F]");
                nextBtn.classList.add("bg-red-600");
            }

            renderGrid();
            updateProgress();
        }


        // Answer
        function handleAnswer(value) {
            answers[exam.questions[currentQuestion].id] = value;
            updateProgress();
            renderGrid();
        }

        function updateProgress() {
            const answeredCount = Object.keys(answers).length;
            const percent = (answeredCount / exam.questions.length) * 100;

            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("progressText").textContent =
                `Đã trả lời: ${answeredCount}/${exam.questions.length}`;
        }

        // Navigation
        document.getElementById("prevBtn").onclick = () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        };

        document.getElementById("nextBtn").onclick = () => {
            if (currentQuestion < exam.questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                openDialog();
            }
        };

        // Grid
        function renderGrid() {
            const grid = document.getElementById("questionGrid");
            grid.innerHTML = "";

            exam.questions.forEach((q, index) => {
                const answered = answers[q.id] !== undefined;
                const active = index === currentQuestion;

                let statusClass = "";

                if (active) {
                    statusClass = "bg-red-600 text-white";
                } else if (answered) {
                    statusClass = "bg-green-100";
                }

                grid.innerHTML += `
                    <button onclick="goToQuestion(${index})"
                        class="w-13 h-10 border rounded-lg ${statusClass}">
                        ${index + 1}
                    </button>
                `;
            });
        }

        function goToQuestion(index) {
            currentQuestion = index;
            renderQuestion();
        }

        // Submit
        function openDialog() {
            const answeredCount = Object.keys(answers).length;

            if (answeredCount === exam.questions.length) {
                document.getElementById("dialogText").innerHTML =
                    `Bạn đã trả lời <strong>${answeredCount}/${exam.questions.length}</strong> câu.<br>
                    Bạn có chắc chắn muốn nộp bài?`;
            } else {
                document.getElementById("dialogText").innerHTML =
                    `Bạn đã trả lời <strong>${answeredCount}/${exam.questions.length}</strong> câu.<br>
                    <p class="text-red-600 text-sm mt-2 mb-2">Còn <strong>${exam.questions.length - answeredCount}</strong> câu chưa trả lời!</p> 
                    Bạn có chắc chắn muốn nộp bài?`;
            }

            document.getElementById("submitDialog").classList.remove("hidden");
            document.getElementById("submitDialog").classList.add("flex");
        }

        function closeDialog() {
            document.getElementById("submitDialog").classList.add("hidden");
        }

        function handleSubmit() {
            clearInterval(timer);

            let correctCount = 0;
            exam.questions.forEach(q => {
                if (answers[q.id] === q.correctAnswer) correctCount++;
            });

            const result = {
                examId: exam.id,
                answers: answers,
                correctAnswers: correctCount,
                totalQuestions: exam.questions.length,
                score: (correctCount / exam.questions.length) * 10,
                completedAt: new Date().toISOString()
            };

            localStorage.setItem(`result-${exam.id}`, JSON.stringify(result));

            window.location.href = `result.html?examId=${exam.id}`;
        }

     </script>
</body>
</html>
