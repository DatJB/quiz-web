<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm bài thi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Header -->
     <header class="bg-red-600 text-white shadow-md sticky top-0 z-10">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div>
                    <h1 id="examTitle" class="text-xl font-semibold"></h1>
                    <p id="questionInfo" class="text-md opacity-90 mt-1"></p>
                </div>

                <div class="bg-white/10 px-4 py-2 rounded-lg">
                    <i class="fa-regular fa-clock mr-2 mt-1"></i> <span id="timer" class="font-mono text-lg"></span>
                </div>
            </div>

            <div class="mt-3">
                <div class="w-full bg-white/20 rounded h-2">
                    <div id="progressBar" class="bg-white h-2 rounded w-0"></div>
                </div>
                <p id="progressText" class="text-sm mt-2"></p>
            </div>
        </div>
     </header>
 

    <main class="container mx-auto px-4 py-8 max-w-6xl mt-5">      
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left: Question Grid -->
            <div class="lg:col-span-1 bg-white shadow rounded-lg p-6 h-fit">
                <h3 class="text-lg font-semibold mb-4">Danh sách câu hỏi</h3>

                <div id="questionGrid" class="grid grid-cols-5 gap-2"></div>

                <!-- Legend -->
                <div class="flex flex-col gap-3 mt-10 text-sm">
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 bg-red-600 rounded-md"></div>
                        <span>Đang làm</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 bg-green-200 rounded-md"></div>
                        <span>Đã trả lời</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 rounded-md border"></div>
                        <span>Chưa trả lời</span>
                    </div>
                </div>
            </div>


            <!-- Right: Question -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Question -->
                <div class="bg-white shadow rounded-lg p-6">
                    <h2 id="questionText" class="text-lg font-semibold mb-4"></h2>
                    <div id="options"></div>
                </div>

                <!-- Navigation -->
                <div class="flex justify-between">
                    <button id="prevBtn"
                        class="px-4 py-2 border bg-white/10 font-semibold rounded-lg hover:bg-black/10">
                        Câu trước
                    </button>

                    <button id="nextBtn"
                        class="px-4 py-2 bg-red-600 text-white font-semibold rounded-lg hover:opacity-90">
                        Câu tiếp theo
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Submit modal -->
     <div id="submitDialog" class="fixed inset-0 bg-black/40 hidden items-center justify-center">
        <div class="bg-white p-6 rounded-lg w-96">
            <h3 class="text-lg font-semibold mb-3"><i class="fa-solid fa-circle-exclamation mr-2"></i>Xác nhận nộp bài</h3>
            <p id="dialogText" class="mb-4"></p>
            <div class="flex justify-end gap-3">
                <button onclick="closeDialog()" class="px-4 py-2 border rounded-lg hover:bg-black/10">Hủy</button>
                <button onclick="handleSubmit()" class="px-4 py-2 bg-[#BE393F] text-white rounded-lg hover:opacity-90">Nộp bài</button>
            </div>
        </div>
     </div>

     <script src="../js/student-exam.js"></script>
</body>
</html>
