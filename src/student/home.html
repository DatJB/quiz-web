<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../data/exams.js"></script>
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Header -->
     <header class="bg-red-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-semibold">Hệ thống thi trắc nghiệm PTIT</h1>
                <p class="text-sm opacity-90 mt-1.5">Học viện Công nghệ Bưu chính Viễn thông</p>
            </div>  

            <a href="https://ptit.edu.vn" target="_blank"
            class="hidden lg:flex justify-center absolute left-1/2 transform translate-x-1/7 w-14 h-14 rounded-full border-2 p-1 bg-white shadow-lg">
                <img src="../../images/logo-ptit.png"
                    class="object-contain"
                    alt="PTIT Logo">
            </a>

            <div class="relative inline-block text-left">
                <button id="dropdownBtn"
                    class="flex items-center gap-2 text-white hover:bg-white/20 px-3 py-2 rounded-lg transition mr-3">

                    <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center">
                        <i class="fa-regular fa-user text-red-600"></i>
                    </div>

                    <!-- Info -->
                    <div class="text-left hidden sm:block ml-1 mr-1">
                        <p id="fullname" class="text-md font-medium">Nguyễn Văn An</p>
                        <p id="studentCode" class="text-sm font-semibold opacity-75">B21DCCN001</p>
                    </div>

                    <div>
                        <i class="fa-solid fa-angle-down"></i>
                    </div>
                </button>

                <!-- Dropdown Content -->
                <div id="dropdownMenu"
                    class="hidden absolute right-0 mt-2 bg-white rounded-lg shadow-lg border z-50 mr-4">
                    <!-- Label -->
                    <div class="px-4 py-3 border-b">
                        <p id="name" class="text-sm font-medium text-gray-900">Nguyễn Văn An</p>
                        <p id="email" class="text-xs text-gray-500 mt-1 font-semibold">annv1@student.ptit.edu.vn</p>
                    </div>

                    <!-- Menu Items -->
                    <button onclick="window.location.href = '../student/profile.html'"
                    class="w-40 text-left px-4 py-2 text-md font-semibold text-red-600 hover:bg-gray-100 hover: rounded-lg items-center">
                        <i class="fa-regular fa-user text-red-600 h-4 w-4 mr-2"></i> Hồ sơ
                    </button>

                    <button onclick="logOut()"
                    class="w-full text-left px-4 py-2 text-md font-semibold text-red-600 hover:bg-gray-100 hover:rounded-lg flex items-center">
                        <img src="../../images/logout-icon.png" class="h-4 w-4 mr-3"/> Đăng xuất
                    </button>
                </div>
            </div>
        </div>
     </header>

     <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-2xl shadow border mb-6">
            <div class="flex flex-col md:flex-row gap-4">

                <!-- Search -->
                 <i class="fa-solid fa-magnifying-glass mt-3.5"></i>
                <input id="searchInput" type="text" placeholder="Tìm kiếm kỳ thi..."
                class="flex-1 border-2 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-500 placeholder:text-gray-500  "
                oninput="renderExams()" />

                <!-- Filter buttons -->
                <div class="flex gap-2 flex-wrap">
                    <button onclick="setFilter('all', event)" class="filter-btn bg-red-600 text-white px-4 py-2 rounded-lg font-semibold">Tất cả</button>
                    <button onclick="setFilter('practice', event)" class="filter-btn border px-4 py-2 rounded-lg font-semibold">Luyện tập</button>
                    <button onclick="setFilter('midterm', event)" class="filter-btn border px-4 py-2 rounded-lg font-semibold">Giữa kỳ</button>
                    <button onclick="setFilter('final', event)" class="filter-btn border px-4 py-2 rounded-lg font-semibold">Cuối kỳ</button>
                </div>
            </div>
        </div>

        <!-- Exam list -->
        <div id="examList" class="grid grid-cols-1 mt-10 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="emptyMessage" class="hidden text-center text-md py-12 text-gray-500">
            Không tìm thấy kỳ thi nào
        </div>
     </main>

     <script src="../js/student-home.js"></script>
    
</body>
</html>
