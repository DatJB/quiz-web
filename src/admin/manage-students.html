<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Quản lí sinh viên</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body class="bg-gray-50 min-h-screen p-6 space-y-6">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"> 
            <div>
                <h1 class="text-2xl mb-1">Quản lý sinh viên</h1>
                <p class="text-gray-600">Thêm, sửa, xóa tài khoản sinh viên</p>
            </div>
            
            <button onclick="goToAddStudent()" class="flex items-center gap-2 bg-red-600 text-white px-4 py-2 rounded-xl whitespace-nowrap transition-all duration-200 ease-in-out hover:bg-red-600/90 hover:shadow-md">
                <img src="../../images/user-plus.svg" class="w-4 h-4 filter brightness-0 invert" alt="user plus icon">
                <span>Thêm sinh viên</span>
            </button>
        </header>

        <main class="container mx-auto px-4 py-8">
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <div class="flex-1 relative">
                    <img src="../../images/search.svg" 
                        class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 opacity-60"
                        alt="search icon"
                    />

                    <input id="searchInput" oninput="handleSearch()" placeholder="Tìm kiếm theo tên, email hoặc mã sinh viên..."
                        class="pl-10 bg-white border border-gray-300 rounded-xl px-4 py-2 w-full
                            focus:outline-none focus:border-red-500 focus:ring-4 focus:ring-red-300
                            transition-all duration-200"
                    />
                </div>
            </div>

            <div class="bg-white rounded-xl shadow p-6"> 
                <div class="mb-4 border-b pb-3">
                    <h2 class="text-xl font-semibold">
                        Danh sách sinh viên (<span id="studentCount">0</span>)
                    </h2>
                </div>
                
                <div class="text-xl font-semibold">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b">
                                <th class="text-left py-3 px-4">Mã SV</th>
                                <th class="text-left py-3 px-4">Họ và tên</th>
                                <th class="text-left py-3 px-4">Lớp</th>
                                <th class="text-left py-3 px-4">Email</th>
                                <th class="text-left py-3 px-4">Ngày tạo</th>
                                <th class="text-center py-3 px-4">Thao tác</th>
                            </tr>
                        </thead>

                        <tbody id="studentTable">

                        </tbody>
                    </table>

                    <div id="emptyBox" class="text-center py-12 text-gray-500">
                        <img src="../../images/user.svg" class="w-12 h-12 mx-auto mb-3 opacity-50" />
                        <p>Không tìm thấy sinh viên nào</p>
                    </div>
                </div>
            </div>
        </main>
    </body>

    <script src="../../data/users.js"></script>
    <script src="../js/manage-student.js"></script>
</html>
