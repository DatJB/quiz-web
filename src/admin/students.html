<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kết quả sinh viên</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>

    <div id="header-container"></div>

    <body id="mainContent" class="min-h-screen bg-gray-50 translate-x duration-300">
        <div class="mt-5">
            <div class="container mx-auto px-8 py-4">
                <div class="flex items-center gap-4">
                    <!-- <button onclick="goToDashboard()" class="p-2 rounded-xl hover:bg-white/10 transition">
                        <img src="../../images/arrow-left.svg" 
                            class="w-5 h-5 invert group-hover:invert-0 transition-all duration-200"
                        >
                    </button> -->
                    <div>
                        <h1 class="text-2xl font-semibold">Kết quả sinh viên</h1>
                        <p class="text-gray-600 mt-1">
                            Xem chi tiết điểm và bài làm của sinh viên
                        </p>
                    </div>

                </div>
            </div>
        </div>


        <main class="container mx-auto px-4 py-8 -mt-4">

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white rounded-xl shadow p-4">
                    <h2 class="font-semibold mb-4">Danh sách sinh viên</h2>

                    <div class="flex flex-col md:flex-row gap-4 mb-6">
                        <div class="flex-1 relative">
                            <img src="../../images/search.svg" 
                                class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 opacity-60"
                                alt="search icon"
                            />

                            <input id="searchInput" oninput="handleSearch()" placeholder="Tìm kiếm sinh viên..."
                                class="pl-10 bg-gray-100 border border-gray-300 rounded-xl px-4 py-2 w-full
                                    focus:outline-none focus:border-red-500 focus:ring-4 focus:ring-red-300 focus:bg-white
                                    transition-all duration-200"
                            />
                        </div>
                    </div>

                    <div id="studentList" class="space-y-2 max-h-[600px] overflow-y-auto">
                    </div>
                </div>

                <div class="lg:col-span-2 bg-white rounded-xl shadow p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 id="detailTitle" class="text-lg font-semibold">
                            Chọn sinh viên
                        </h2>
                        <button id="exportBtn" onclick="exportReport()"
                            class="hidden border px-4 py-2 rounded-xl hover:bg-gray-50"
                        >
                            Xuất báo cáo
                        </button>
                    </div>

                    <div id="studentDetail">
                        <div class="text-center py-12 text-gray-500">
                            Vui lòng chọn sinh viên từ danh sách bên trái
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </body>

    <script src="../js/header.js"></script>
    <script src="../../data/users.js"></script>
    <script src="../../data/exams.js"></script>
    <script src="../../data/results.js"></script>
    <script src="../js/student-results.js"></script>
</html>
