<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Chỉnh sửa sinh viên</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>

    <div id="header-container"></div>

    <body id="mainContent" class="min-h-screen bg-gray-50">
        <div class="mt-5">
            <div class="container mx-auto px-4 py-4">
                <div class="flex items-center gap-6">
                    <button onclick="goToStudents()" class="p-2 rounded-md hover:bg-white/10 transition">
                        <img src="../../images/arrow-left.svg" 
                            class="w-5 h-5 group-hover:invert-0 transition-all duration-200"
                        >
                    </button>
                    <div>
                        <h1 class="text-2xl font-semibold">Chỉnh sửa sinh viên</h1>
                        <p class="text-md opacity-90 mt-1">Cập nhật thông tin sinh viên</p>
                    </div>
                </div>
            </div>
        </div>

        <main class="container mx-auto px-4 py-8 -mt-5">
            <div class="bg-white rounded-lg shadow p-6 max-w-2xl mx-auto">
                <div class="mb-4 border-b pb-3">
                    <h2 class="text-xl font-semibold">Thông tin sinh viên</h2>
                </div>

                <div class="overflow-x-auto p-3">
                    <form class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label for="studentCode" class="text-sm font-medium text-gray-700">
                                    Mã sinh viên *
                                </label>
                                <input id="studentCode" name="studentCode" type="text" placeholder="VD: B20DCCN001" 
                                    class="border border-gray-300 rounded-md px-4 py-2 w-full text-sm
                                        focus:outline-none focus:border-red-500 focus:ring-4 focus:ring-red-300 focus:bg-white
                                        transition-all duration-200"
                                >
                            </div>

                            <div class="space-y-2">
                                <label for="studentClass" class="text-sm font-medium text-gray-700">
                                    Lớp *
                                </label>
                                <input id="studentClass" name="studentClass" type="text" placeholder="VD: D20CQCN01-B" 
                                    class="border border-gray-300 rounded-md px-4 py-2 w-full text-sm
                                        focus:outline-none focus:border-red-500 focus:ring-4 focus:ring-red-300 focus:bg-white
                                        transition-all duration-200"
                                >
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label for="studentName" class="text-sm font-medium text-gray-700">
                                Họ và tên *
                            </label>
                            <input id="studentName" name="studentName" type="text" placeholder="Nhập họ và tên đầy đủ" 
                                class="border border-gray-300 rounded-md px-4 py-2 w-full text-sm
                                    focus:outline-none focus:border-red-500 focus:ring-4 focus:ring-red-300 focus:bg-white
                                    transition-all duration-200"
                            >
                        </div>

                        <div class="space-y-2">
                            <label for="studentEmail" class="text-sm font-medium text-gray-700">
                                Email *
                            </label>
                            <input id="studentEmail" name="studentEmail" type="email" placeholder="VD: example@ptit.edu.vn" 
                                class=" border border-gray-300 rounded-md px-4 py-2 w-full text-sm
                                    focus:outline-none focus:border-red-500 focus:ring-4 focus:ring-red-300 focus:bg-white
                                    transition-all duration-200"
                            >
                        </div>

                        <div class="border-t pt-4 mt-4">
                            <h3 class="font-medium mb-4">Đổi mật khẩu (để trống nếu không muốn đổi)</h3>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label for="password" class="text-sm font-medium text-gray-700">
                                        Mật khẩu
                                    </label>
                                    <input id="password" name="password" type="password" placeholder="Nhập mật khẩu mới"
                                        class="border border-gray-300 rounded-md px-4 py-2 w-full text-sm
                                            focus:outline-none focus:border-red-500 focus:ring-4 focus:ring-red-300 focus:bg-white
                                            transition-all duration-200"
                                    >
                                </div>

                                <div class="space-y-2">
                                    <label for="confirmPassword" class="text-sm font-medium text-gray-700">
                                        Xác nhận mật khẩu
                                    </label>
                                    <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Nhập lại mật khẩu" 
                                        class="border border-gray-300 rounded-md px-4 py-2 w-full text-sm
                                            focus:outline-none focus:border-red-500 focus:ring-4 focus:ring-red-300 focus:bg-white
                                            transition-all duration-200"
                                    >
                                </div>
                            </div>
                        </div>

                        <div class="flex gap-3 pt-4">
                            <button type="button" onclick="goToStudents()"
                                class="flex-1 border border-gray-300 rounded-md px-4 py-2 hover:bg-gray-100 transition-colors"
                            >
                                Hủy
                            </button>

                            <button type="submit"
                                class="flex-1 flex items-center justify-center bg-red-600 text-white rounded-md px-4 py-2 hover:bg-red-600/90 transition-colors"
                            >
                                <img src="../../images/save.svg" class="w-4 h-4 mr-2 filter brightness-0 invert">
                                <span>Cập nhật</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </body>

    <script src="../js/header.js"></script>
    <script src="../../data/users.js"></script>
    <script src="../js/create-edit-student.js"></script>
</html>
