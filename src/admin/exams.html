<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý kỳ thi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 overflow-x-hidden">

    <div id="header-container"></div>

    <div class="flex pt-[50px]"> 
        <main id="mainContent" class="flex-1 transition-all duration-300 lg:ml-64 w-full -mt-2.5">
            <div class="px-6 py-4 space-y-6 max-w-5xl mx-auto">
                
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <h1 class="text-2xl font-semibold mb-1">Quản lý kỳ thi</h1>
                        <p class="text-gray-600">Tạo, chỉnh sửa và quản lý các kỳ thi</p>
                    </div>
                    <button onclick="createExam()" class="flex items-center gap-2 bg-[#e53e3e] hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                        <i class="fa-solid fa-plus"></i> Tạo kỳ thi mới
                    </button>
                </div>

                <div class="bg-white shadow-sm border border-gray-100 rounded-xl p-4">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                        </div>
                        <input type="text" id="searchInput" placeholder="Tìm kiếm kỳ thi..." class="w-full bg-gray-50 text-gray-900 border border-gray-200 rounded-lg pl-10 pr-4 py-2.5 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all" oninput="filterExams()" />
                    </div>
                </div>

                <div id="examList" class="space-y-4"></div>

                <div id="emptyState" class="hidden text-center py-12 text-gray-500">
                    Không tìm thấy kỳ thi nào
                </div>

            </div>
        </main>
    </div>

    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-96 shadow-xl">
            <h2 class="text-lg font-semibold mb-2">Xác nhận xóa</h2>
            <p class="text-gray-600 mb-6 text-sm">Bạn có chắc chắn muốn xóa kỳ thi này? Hành động này không thể hoàn tác.</p>
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 font-medium transition-colors">Hủy</button>
                <button onclick="confirmDelete()" class="px-4 py-2 bg-[#e53e3e] text-white rounded-lg hover:bg-red-700 font-medium transition-colors">Xóa</button>
            </div>
        </div>
    </div>

    <script src="../js/header.js"></script>
    <script src="../../data/exams.js"></script>
    <script src="../js/admin-exams.js"></script>

</body>
</html>
