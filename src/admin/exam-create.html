<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạo kỳ thi mới</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <style>
        @media (min-width: 1024px) {
            #sidebar {
                position: fixed !important; 
            }
        }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden">

    <div id="header-container"></div>

    <div class="flex pt-[50px]">
        <main id="mainContent" class="flex-1 transition-all duration-300 lg:ml-64 -mt-3">
            <div class="p-6 max-w-4xl mx-auto space-y-6">
                
                <div class="flex items-center gap-3 mb-2">
                    <button onclick="window.location.href='exams.html'" class="text-gray-500 hover:text-red-600 transition">
                        <i class="fa-solid fa-arrow-left text-lg"></i>
                    </button>
                    <h1 class="text-2xl font-semibold">Tạo kỳ thi mới</h1>
                </div>

                <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                    <h2 class="text-lg font-semibold mb-5 text-gray-800">Thông tin cơ bản</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tên kỳ thi <span class="text-red-500">*</span></label>
                            <input type="text" id="examName" placeholder="Ví dụ: Luyện tập - Lập trình Web" class="w-full bg-gray-50 border border-transparent focus:bg-white focus:border-red-500 focus:ring-2 focus:ring-red-100 rounded-lg px-4 py-2.5 transition-all outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mô tả <span class="text-red-500">*</span></label>
                            <textarea id="examDesc" rows="3" placeholder="Mô tả ngắn gọn về kỳ thi" class="w-full bg-gray-50 border border-transparent focus:bg-white focus:border-red-500 focus:ring-2 focus:ring-red-100 rounded-lg px-4 py-2.5 transition-all outline-none"></textarea>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Loại kỳ thi <span class="text-red-500">*</span></label>
                                <select id="examType" class="w-full bg-gray-50 border border-transparent focus:bg-white focus:border-red-500 focus:ring-2 focus:ring-red-100 rounded-lg px-4 py-2.5 transition-all outline-none appearance-none">
                                    <option value="practice">Luyện tập</option>
                                    <option value="midterm">Giữa kỳ</option>
                                    <option value="final">Cuối kỳ</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Trạng thái <span class="text-red-500">*</span></label>
                                <select id="examStatus" onchange="toggleScheduledDate()" class="w-full bg-gray-50 border border-transparent focus:bg-white focus:border-red-500 focus:ring-2 focus:ring-red-100 rounded-lg px-4 py-2.5 transition-all outline-none appearance-none">
                                    <option value="free">Tự do</option>
                                    <option value="scheduled">Theo lịch</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="mt-0.5">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Thời gian (phút) <span class="text-red-500">*</span></label>
                                <input type="number" id="editDuration" required min="1" class="w-full bg-gray-50 border border-gray-200 focus:bg-white focus:border-red-500 focus:ring-2 focus:ring-red-100 rounded-lg px-4 py-2.5 transition-all outline-none">
                            </div>
                            <div id="dateContainer" class="hidden">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Thời gian bắt đầu</label>
                                <input type="datetime-local" id="editScheduledDate" class="w-full bg-gray-50 border border-gray-200 focus:bg-white focus:border-red-500 focus:ring-2 focus:ring-red-100 rounded-lg px-4 py-2.5 transition-all outline-none">
                            </div>
                            </div>
                    </div>
                </div>

                <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                        <h2 class="text-lg font-semibold text-gray-800" id="questionCountText">Câu hỏi (0)</h2>
                        <div class="flex gap-3 w-full sm:w-auto">
                            <button onclick="importExcel()" class="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-lg font-medium transition-colors">
                                <i class="fa-solid fa-upload"></i> Import Excel
                            </button>
                            <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden" />
                            <button onclick="addQuestion()" class="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-[#c53030] hover:bg-red-800 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                                <i class="fa-solid fa-plus"></i> Thêm câu hỏi
                            </button>
                        </div>
                    </div>

                    <div id="questionList" class="space-y-4 hidden"></div>

                    <div id="emptyQuestions" class="text-center py-10">
                        <p class="text-gray-500">Chưa có câu hỏi nào. Nhấn "Thêm câu hỏi" để bắt đầu.</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="window.location.href='exams.html'" class="w-full bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 py-3 rounded-lg font-semibold transition-colors">
                        Hủy
                    </button>
                    <button onclick="submitExam()" class="w-full bg-[#ef4444] hover:bg-red-600 text-white py-3 rounded-lg font-semibold transition-colors flex items-center justify-center gap-2">
                        <i class="fa-regular fa-floppy-disk"></i> Tạo kỳ thi
                    </button>
                </div>
                
                <div class="h-10"></div>
            </div>
        </main>
    </div>

    <script src="../js/header.js"></script>
    <script src="../../data/exams.js"></script>
    <script src="../js/exam-create.js"></script>
</body>
</html>
